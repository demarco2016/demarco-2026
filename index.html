function catBadge(cat) {
    if (cat.includes("Swap")) return "badge-dex";
    if (cat.includes("Bridge")) return "badge-bridge";
    if (cat.includes("DeFi")) return "badge-defi";
    if (cat.includes("AI")) return "badge-ai";
    if (cat.includes("Gaming")) return "badge-gaming";
    if (cat.includes("L1")) return "badge-l1";
    return "badge-other";
}
function render(rows) {
    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = rows.map((r,i)=>`
        <tr>
            <td class="num-col">${i+1}</td>
            <td><div class="proj-name">${r.proj}</div></td>
            <td><span class="badge ${catBadge(r.cat)}">${r.cat}</span></td>
            <td><span class="task-tag">${r.task}</span></td>
            <td><a href="${r.link}" target="_blank" class="link-btn">Open â†’</a></td>

        </tr>
    `).join("");
    document.getElementById("totalProjects").textContent = rows.length;
}
function filterTable() {
    const q = document.getElementById("searchInput").value.toLowerCase();
    const cat = document.getElementById("categoryFilter").value;
    let filtered = DATA.filter(r => (r.proj.toLowerCase().includes(q)||r.task.toLowerCase().includes(q)) && (!cat || r.cat.includes(cat)));
    render(filtered);
}
render(DATA);
