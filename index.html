<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEMARCO 2026 â€” Project Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #fff;
            color: #171a20;
            min-height: 100vh;
        }
        .navbar {
            background: #fff;
            border-bottom: 1px solid #eee;
            padding: 0 24px;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            height: 56px;
            gap: 24px;
        }
        .nav-logo {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #171a20;
        }
        .nav-logo span { color: #da291c; }
        .nav-search {
            flex: 1;
            display: flex;
            max-width: 480px;
        }
        .nav-search input {
            flex: 1;
            padding: 8px 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
            background: #f5f5f5;
            transition: .2s;
        }
        .nav-search input:focus {
            border-color: #da291c;
            background: #fff;
        }
        .nav-search button {
            background: none;
            border: none;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 13px;
            color: #666;
            font-weight: 500;
        }
        .nav-links {
            display: flex;
            gap: 20px;
            font-size: 12px;
            white-space: nowrap;
        }
        .nav-links div { cursor: default; }
        .nav-links .bold { font-weight: 600; font-size: 13px; color: #171a20; }
        .nav-links .label { color: #999; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 24px 24px 0; }
        .banner {
            margin-bottom: 28px;
        }
        .banner h1 {
            font-size: 28px;
            font-weight: 600;
            color: #171a20;
            letter-spacing: -.5px;
        }
        .banner p {
            font-size: 14px;
            color: #666;
            margin-top: 4px;
        }
        .banner-meta {
            display: flex;
            gap: 16px;
            align-items: center;
            margin-top: 8px;
        }
        .banner-meta .badge {
            background: #da291c;
            color: #fff;
            padding: 4px 14px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        .controls select {
            padding: 8px 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 13px;
            background: #fff;
            outline: none;
            cursor: pointer;
            color: #171a20;
        }
        .controls select:focus { border-color: #da291c; }
        .controls .count {
            font-size: 13px;
            color: #999;
            margin-left: auto;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }
        .card {
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            overflow: hidden;
            transition: all .25s;
            display: flex;
            flex-direction: column;
            background: #fff;
        }
        .card:hover {
            border-color: #da291c;
            box-shadow: 0 4px 24px rgba(218,41,28,0.08);
        }
        .card-img {
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fafafa;
            border-bottom: 1px solid #eee;
        }
        .card-img .initial {
            font-size: 32px;
            font-weight: 700;
            color: #ccc;
            text-transform: uppercase;
        }
        .card-body {
            padding: 16px 18px 18px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .card-title {
            font-size: 17px;
            font-weight: 600;
            color: #171a20;
            margin-bottom: 2px;
        }
        .card-cat {
            font-size: 11px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .card-task {
            font-size: 13px;
            color: #666;
            margin-bottom: 14px;
            flex: 1;
        }
        .card-task strong { color: #171a20; }
        .card-footer {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .card-footer .btn {
            flex: 1;
            padding: 10px 16px;
            border-radius: 4px;
            border: none;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: all .2s;
            letter-spacing: .5px;
            text-transform: uppercase;
        }
        .btn-primary {
            background: #da291c;
            color: #fff;
        }
        .btn-primary:hover { background: #b71c1c; }
        .btn-secondary {
            background: #fff;
            color: #171a20;
            border: 1px solid #ccc;
        }
        .btn-secondary:hover { border-color: #da291c; color: #da291c; }
        .footer {
            border-top: 1px solid #eee;
            color: #999;
            text-align: center;
            padding: 24px 16px;
            margin-top: 40px;
            font-size: 12px;
        }
        .footer strong { color: #171a20; font-weight: 600; }
        .footer a { color: #da291c; text-decoration: none; font-weight: 500; }
        .footer a:hover { text-decoration: underline; }
        .footer span { margin: 0 6px; color: #ccc; }
        @media (max-width: 640px) {
            .nav-links { display: none; }
            .nav-search input { font-size: 13px; }
            .grid { grid-template-columns: 1fr; }
            .container { padding: 16px 16px 0; }
            .banner h1 { font-size: 22px; }
        }
    </style>
</head>
<body>
<div class="navbar">
    <div class="nav-inner">
        <div class="nav-logo">D<span>EMARCO</span> 2026</div>
        <div class="nav-search">
            <input type="text" id="searchInput" placeholder="Search projects..." oninput="filterTable()">
            <button>Search</button>
        </div>
        <div class="nav-links">
            <div><span class="label">Editor</span><br><span class="bold">demarco2016</span></div>
            <div><span class="label">Admin</span><br><span class="bold">Kiravixx</span></div>
        </div>
    </div>
</div>
<div class="container">
    <div class="banner">
        <h1>Project Big Potential in 2026</h1>
        <p>Daily tracker â€” Deep work for 6 hours every day</p>
        <div class="banner-meta">
            <div class="badge"><span id="totalProjects">0</span> Projects</div>
            <select id="categoryFilter" onchange="filterTable()">
                <option value="">All Categories</option>
                <option value="DeFi / Swap">DeFi / Swap</option>
                <option value="L1 / L2 / Testnet">L1 / L2 / Testnet</option>
                <option value="AI / Testnet">AI / Testnet</option>
                <option value="AI / App">AI / App</option>
                <option value="Gaming / App">Gaming / App</option>
                <option value="DeFi / Bridge">DeFi / Bridge</option>
                <option value="DeFi / Community">DeFi / Community</option>
                <option value="DeFi / Rewards">DeFi / Rewards</option>
                <option value="DeFi / Points">DeFi / Points</option>
                <option value="DeFi / App">DeFi / App</option>
            </select>
        </div>
    </div>
    <div class="controls">
        <div class="count" id="resultCount">Showing 0 projects</div>
    </div>
    <div class="grid" id="cardsContainer"></div>
    <div class="footer">
        <strong>DEMARCO2016</strong><span>â€”</span>Editor<span>Â·</span><strong>Kiravixx</strong><span>â€”</span>ADMIN<br>
        <a href="https://t.me/KIRAVIXXXairdrophub" target="_blank">Join on Telegram</a>
    </div>
</div>
<script>
const DATA = [
    {proj:"Canopy Network",cat:"L1 / L2 / Testnet",task:"Rewards",link:"https://canopy.network"},
    {proj:"Canopy Network",cat:"L1 / L2 / Testnet",task:"Staking",link:"https://canopy.network"},
    {proj:"GenLayer",cat:"AI / Testnet",task:"Portal",link:"https://genlayer.com"},
    {proj:"GenLayer",cat:"AI / Testnet",task:"Studio",link:"https://studio.genlayer.com"},
    {proj:"Miden",cat:"L1 / L2 / Testnet",task:"Playground",link:"https://miden.io"},
    {proj:"dFusion AI",cat:"AI / Testnet",task:"Testnet",link:"https://dfusion.ai"},
    {proj:"ARC Network",cat:"DeFi / Community",task:"Community",link:"https://arc.network"},
    {proj:"Sumex",cat:"DeFi / Swap",task:"Dashboard",link:"https://sumex.xyz"},
    {proj:"DAChain",cat:"L1 / L2 / Testnet",task:"Inception",link:"https://dachain.io"},
    {proj:"X1 EcoChain",cat:"L1 / L2 / Testnet",task:"Testnet",link:"https://x1ecochain.com"},
    {proj:"Inco",cat:"L1 / L2 / Testnet",task:"Experiences",link:"https://inco.network"},
    {proj:"Linera",cat:"L1 / L2 / Testnet",task:"Market",link:"https://linera.io"},
    {proj:"Linera",cat:"L1 / L2 / Testnet",task:"Portal",link:"https://linera.io"},
    {proj:"Vara Network",cat:"DeFi / Bridge",task:"Bridge",link:"https://vara.network"},
    {proj:"Vara Network",cat:"DeFi / Bridge",task:"DEX",link:"https://vara.network"},
    {proj:"IOPN",cat:"DeFi / Swap",task:"Faucet",link:"https://iopn.finance"},
    {proj:"IOPN",cat:"DeFi / Swap",task:"Swap",link:"https://iopn.finance"},
    {proj:"Robinhood Chain",cat:"L1 / L2 / Testnet",task:"Faucet",link:"https://robinhoodchain.com"},
    {proj:"Arbitrum",cat:"DeFi / Bridge",task:"Bridge",link:"https://arbitrum.io"},
    {proj:"Arkada",cat:"Gaming / App",task:"App",link:"https://arkada.gg"},
    {proj:"ADI Foundation",cat:"AI / Testnet",task:"Explorer",link:"https://adi.foundation"},
    {proj:"ADI Foundation",cat:"AI / Testnet",task:"Faucet",link:"https://adi.foundation"},
    {proj:"ADI Foundation",cat:"AI / Testnet",task:"Bridge",link:"https://adi.foundation"},
    {proj:"Hashi / SUI",cat:"DeFi / Bridge",task:"DevNet",link:"https://hashi.io"},
    {proj:"SUI",cat:"L1 / L2 / Testnet",task:"Faucet",link:"https://sui.io"},
    {proj:"Prismax AI",cat:"AI / App",task:"Fleet",link:"https://prismax.ai"},
    {proj:"Bulk Trade",cat:"DeFi / Swap",task:"Early Access",link:"https://bulktrade.io"},
    {proj:"Into Space",cat:"Gaming / App",task:"Beta",link:"https://intospace.game"},
    {proj:"MeyHub",cat:"DeFi / Rewards",task:"Bricks",link:"https://meyhub.com"},
    {proj:"Concrete XYZ",cat:"DeFi / Points",task:"Points",link:"https://concrete.xyz"},
    {proj:"LitVM",cat:"L1 / L2 / Testnet",task:"Testnet",link:"https://litvm.com"},
    {proj:"SimpleChain",cat:"L1 / L2 / Testnet",task:"Task",link:"https://simplechain.io"},
    {proj:"KiiChain",cat:"L1 / L2 / Testnet",task:"Testnet",link:"https://kiichain.io"},
    {proj:"Nemesis Trade",cat:"DeFi / Swap",task:"Trade",link:"https://nemesistrade.io"},
];
const COLORS = ["#da291c","#171a20","#333","#555","#777","#999","#bbb","#ccc","#ddd","#eee"];
function cardColor(name) {
    let hash = 0;
    for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
    return COLORS[Math.abs(hash) % COLORS.length];
}
function render(rows) {
    const container = document.getElementById("cardsContainer");
    container.innerHTML = rows.map(r => `
        <div class="card">
            <div class="card-img">
                <div class="initial" style="color:${cardColor(r.proj)}">${r.proj.charAt(0)}</div>
            </div>
            <div class="card-body">
                <div class="card-title">${r.proj}</div>
                <div class="card-cat">${r.cat}</div>
                <div class="card-task"><strong>${r.task}</strong></div>
                <div class="card-footer">
                    <a href="${r.link}" target="_blank" class="btn btn-primary">Open</a>
                    <a href="${r.link}" target="_blank" class="btn btn-secondary">Info</a>
                </div>
            </div>
        </div>
    `).join("");
    document.getElementById("totalProjects").textContent = rows.length;
    document.getElementById("resultCount").textContent = `Showing ${rows.length} project${rows.length!==1?'s':''}`;
}
function filterTable() {
    const q = document.getElementById("searchInput").value.toLowerCase();
    const cat = document.getElementById("categoryFilter").value;
    let filtered = DATA.filter(r => (r.proj.toLowerCase().includes(q)||r.task.toLowerCase().includes(q)) && (!cat || r.cat.includes(cat)));
    render(filtered);
}
render(DATA);
</script>
</body>
</html>
