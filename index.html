function catBadge(cat) {
    if (cat.includes("Swap")) return "badge-dex";
    if (cat.includes("Bridge")) return "badge-bridge";
    if (cat.includes("DeFi")) return "badge-defi";
    if (cat.includes("AI")) return "badge-ai";
    if (cat.includes("Gaming")) return "badge-gaming";
    if (cat.includes("L1")) return "badge-l1";
    return "badge-other";
}
function catColor(cat) {
    if (cat.includes("Swap")) return "#00838f";
    if (cat.includes("Bridge")) return "#c62828";
    if (cat.includes("DeFi")) return "#2e7d32";
    if (cat.includes("AI")) return "#7b1fa2";
    if (cat.includes("Gaming")) return "#e65100";
    if (cat.includes("L1")) return "#1565c0";
    return "#616161";
}
function avatarBg(name) {
    const colors = ["#1877f2","#e63946","#2a9d8f","#e9c46a","#f4a261","#264653","#6b5b95","#d45087","#2196f3","#4caf50"];
    let hash = 0;
    for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
    return colors[Math.abs(hash) % colors.length];
}
function render(rows) {
    const container = document.getElementById("cardsContainer");

function filterTable() {
    const q = document.getElementById("searchInput").value.toLowerCase();
    const cat = document.getElementById("categoryFilter").value;
    let filtered = DATA.filter(r => (r.proj.toLowerCase().includes(q)||r.task.toLowerCase().includes(q)) && (!cat || r.cat.includes(cat)));

}
render(DATA);
