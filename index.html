function tagClass(cat) {
    if (cat.includes("Swap")) return "tag-dex";
    if (cat.includes("Bridge")) return "tag-bridge";
    if (cat.includes("DeFi")) return "tag-defi";
    if (cat.includes("AI")) return "tag-ai";
    if (cat.includes("Gaming")) return "tag-gaming";
    if (cat.includes("L1")) return "tag-l1";
    return "tag-other";
}
function cardBg(name) {
    const colors = ["#374151","#991b1b","#065f46","#92400e","#1e40af","#6b21a8","#be185d","#15803d","#b45309","#1d4ed8"];
    let hash = 0;
    for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
    return colors[Math.abs(hash) % colors.length];
}
function rating() {
    const stars = Math.floor(Math.random() * 2) + 3;
    return "â˜…".repeat(stars) + "â˜†".repeat(5-stars);
}
function render(rows) {

}
function filterTable() {
    const q = document.getElementById("searchInput").value.toLowerCase();

    render(filtered);
}
